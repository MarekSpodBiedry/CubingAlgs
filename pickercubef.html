<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clickable Cube</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap");

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        font-family: "Space Mono", monospace;
        color: #eee;
        gap: 40px;
        padding: 48px 20px 64px;
      }

      h1 {
        font-size: 11px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: #444;
      }

      button {
        background: #111;
        border: 1px solid #333;
        color: #eee;
        font-family: "Space Mono", monospace;
        padding: 6px 14px;
        cursor: pointer;
      }

      button:hover {
        border-color: #666;
      }

      canvas {
        display: block;
      }

      .controls {
        display: flex;
        gap: 12px;
      }

      .output {
        font-size: 12px;
        color: #888;
        letter-spacing: 2px;
      }
    </style>
  </head>

  <body>
    <h1>Clickable Cube</h1>

    <div id="cube"></div>

    <div class="controls">
      <button id="copy">COPY STATE</button>
      <button id="clear">CLEAR</button>
    </div>

    <div class="output" id="state"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
      // ─── COLOR SYSTEM ─────────────────────

      const ORDER = ["X", "G", "R", "O", "W"];

      const COLORS = {
        Y: 0xffe600,
        G: 0x2dca02,
        R: 0xbb0000,
        B: 0x2100ff,
        O: 0xffa500,
        W: 0xffffff,
        X: 0x606060,
      };

      // ─── STATE ────────────────────────────

      let state = {
        U: [
          ["X", "X", "X"],
          ["X", "X", "X"],
          ["X", "X", "X"],
        ],
        R: [
          ["X", "X", "X"],
          ["X", "X", "X"],
          ["X", "X", "X"],
        ],
        F: [
          ["X", "X", "X"],
          ["X", "X", "X"],
          ["X", "X", "X"],
        ],
      };

      // ─── THREE SETUP ──────────────────────

      let scene, camera, renderer, group;
      let raycaster = new THREE.Raycaster();
      let mouse = new THREE.Vector2();

      function init() {
        scene = new THREE.Scene();

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(320, 320);

        camera = new THREE.OrthographicCamera(-3, 3, 3, -3, 0.1, 100);

        camera.position.set(4, 4, 4);
        camera.lookAt(0, 0, 0);

        group = new THREE.Group();
        scene.add(group);

        document.getElementById("cube").appendChild(renderer.domElement);

        renderer.domElement.addEventListener("click", onClick);

        render();
      }

      function center(i) {
        return i * 1 - 1;
      }

      function createSticker(face, row, col, color) {
        const mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(0.95, 0.95),
          new THREE.MeshBasicMaterial({ color }),
        );

        mesh.userData = { face, row, col };

        return mesh;
      }

      function render() {
        group.clear();

        const faces = ["U", "R", "F"];

        faces.forEach((face) => {
          for (let r = 0; r < 3; r++)
            for (let c = 0; c < 3; c++) {
              let color = COLORS[state[face][r][c]];

              const s = createSticker(face, r, c, color);

              if (face === "U") {
                s.rotation.x = -Math.PI / 2;
                s.position.set(center(c), 1.5, center(2 - r));
              }

              if (face === "R") {
                s.rotation.y = Math.PI / 2;
                s.position.set(1.5, center(2 - r), center(2 - c));
              }

              if (face === "F") {
                s.position.set(center(c), center(2 - r), 1.5);
              }

              group.add(s);
            }
        });

        renderer.render(scene, camera);

        updateText();
      }

      // ─── CLICK HANDLER ────────────────────

      function cycle(letter) {
        let i = ORDER.indexOf(letter);
        return ORDER[(i + 1) % ORDER.length];
      }

      function onClick(event) {
        const rect = renderer.domElement.getBoundingClientRect();

        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        const hits = raycaster.intersectObjects(group.children);

        if (!hits.length) return;

        const { face, row, col } = hits[0].object.userData;

        state[face][row][col] = cycle(state[face][row][col]);

        render();
      }

      // ─── STATE STRING ─────────────────────

      function rowStr(r) {
        return r.join("");
      }

      function faceStr(f) {
        return state[f].map(rowStr).join("-");
      }

      function getState() {
        return faceStr("U") + ":" + faceStr("R") + ":" + faceStr("F");
      }

      function updateText() {
        document.getElementById("state").textContent = getState();
      }

      // ─── BUTTONS ──────────────────────────

      document.getElementById("copy").onclick = () => {
        navigator.clipboard.writeText(getState());
      };

      document.getElementById("clear").onclick = () => {
        for (let f in state)
          for (let r = 0; r < 3; r++)
            for (let c = 0; c < 3; c++) state[f][r][c] = "X";

        render();
      };

      // ─── START ────────────────────────────

      init();
    </script>
  </body>
</html>
